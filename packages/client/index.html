        <h2>A Free Browser MUD &amp; Text RPG</h2>
        <p>Ultimate Dominion is a free multiplayer text-based RPG (MUD) playable in any browser. Fight monsters, trade items, and build your legacy in a persistent on-chain world. No downloads required.</p>

          <li><strong>Combat Triangle</strong> — Strength beats Agility, Agility beats Intelligence, Intelligence beats Strength</li>
          <li><strong>Real Economy</strong> — Player marketplace, on-chain gold, permanent items</li>
