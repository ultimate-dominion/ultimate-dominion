<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <title>Ultimate Dominion</title>

    <meta name="description" content="A persistent world where every choice matters. Fight monsters, trade items, and build your legacy in a browser-based RPG with permanent ownership." />
    <meta name="theme-color" content="#12100E" />
    <link rel="canonical" href="https://ultimatedominion.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ultimate Dominion — A Persistent World" />
    <meta property="og:description" content="Fight monsters, trade items, and build your legacy in a browser-based RPG where every choice matters." />
    <meta property="og:url" content="https://ultimatedominion.com/" />
    <meta property="og:image" content="https://ultimatedominion.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ultimate Dominion — A Persistent World" />
    <meta name="twitter:description" content="Fight monsters, trade items, and build your legacy in a browser-based RPG where every choice matters." />
    <meta name="twitter:image" content="https://ultimatedominion.com/og-image.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "Ultimate Dominion",
      "description": "A persistent world where every choice matters. Fight monsters, trade items, and build your legacy in a browser-based RPG with permanent ownership.",
      "url": "https://ultimatedominion.com",
      "genre": ["RPG", "MMORPG", "Browser Game"],
      "gamePlatform": "Web Browser",
      "applicationCategory": "Game",
      "operatingSystem": "Any"
    }
    </script>
  </head>
  <body>
    <script>
      // Force dark mode
      localStorage.setItem('chakra-ui-color-mode', 'dark');
      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.style.colorScheme = 'dark';
    </script>
    <div id="react-root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
