[profile.default]
solc = "0.8.28"
ffi = false
# fuzz_runs = 256
optimizer = true
# Raised from 1 to 200 — cheaper runtime gas for all player calls.
# script/ is skipped because EnsureAccess.s.sol has 16+ locals and MUD's
# WorldResourceIdLib uses unsafe assembly, causing Yul stack-too-deep at
# optimizer_runs > 1. Scripts compile on demand via `forge script`.
optimizer_runs = 200
via_ir = true
verbosity = 2
cbor_metadata = false
bytecode_hash = "none"
memory_limit = 1073741824
src = "src"
test = "test"
script = "script"
out = "out"
skip = ["script/**"]
evm_version = "cancun"
allow_paths = [
  # pnpm symlinks to the project root's node_modules
  "../../node_modules",
  # template uses linked mud packages from within the mud monorepo
  "../../../../packages",
  # projects created from this template and using linked mud packages
  "../../../mud/packages",
]
extra_output_files = ["abi", "evm.bytecode"]
fs_permissions = [{ access = "read-write", path = "./" }]
libs = ["node_modules"]

# Fast dev/test profile — no via_ir, no optimizer
# Usage: FOUNDRY_PROFILE=lite forge test
[profile.lite]
optimizer = false
via_ir = false
sparse_mode = true

# Script runner profile — optimizer_runs=1 avoids stack-too-deep in EnsureAccess.s.sol
# Usage: FOUNDRY_PROFILE=script forge script ...
[profile.script]
optimizer_runs = 1
skip = []

[profile.base-mainnet]
# eth_rpc_url sourced from ETH_RPC_URL env var (set in .env.testnet / .env.mainnet)
