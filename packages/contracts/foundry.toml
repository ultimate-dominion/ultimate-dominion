[profile.default]
solc = "0.8.24"
ffi = false
fuzz_runs = 256
optimizer = true
optimizer_runs = 10
via_ir = true
verbosity = 2
cbor_metadata = false
bytecode_hash = "none"
memory_limit = 1073741824
src = "src"
test = "test"
out = "out"
target_evm = "cancun"
allow_paths = [
  # pnpm symlinks to the project root's node_modules
  "../../node_modules",
  # template uses linked mud packages from within the mud monorepo
  "../../../../packages",
  # projects created from this template and using linked mud packages
  "../../../mud/packages",
]
extra_output_files = ["abi", "evm.bytecode"]
fs_permissions = [{ access = "read-write", path = "./" }]
libs = ["node_modules", "lib"]

[profile.base-sepolia]
eth_rpc_url = "https://base-sepolia-rpc.publicnode.com"

[profile.garnet]
eth_rpc_url = "https://rpc.garnetchain.com"

[profile.redstone]
eth_rpc_url = "https://rpc.redstonechain.com"
