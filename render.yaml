services:
  - type: web
    name: ultimate-dominion-api
    env: node
    buildCommand: cd packages/api && pnpm install && pnpm build
    startCommand: cd packages/api && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PINATA_JWT
        sync: false
    autoDeploy: true
