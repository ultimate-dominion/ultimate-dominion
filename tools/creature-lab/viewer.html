<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creature Lab — Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #ccc; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { padding: 8px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .back { color: #555; text-decoration: none; font-size: 11px; padding: 3px 8px; border: 1px solid #2a2a2a; }
    .back:hover { color: #888; border-color: #444; }
    .nav-btn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #666; padding: 3px 10px; cursor: pointer; font-family: inherit; font-size: 14px; line-height: 1; }
    .nav-btn:hover { color: #aaa; border-color: #444; }
    .creature-name { font-size: 14px; color: #6a4; min-width: 160px; }
    .badge { font-size: 9px; padding: 1px 5px; border-radius: 2px; text-transform: uppercase; letter-spacing: 1px; }
    .badge-done { background: #1a2a1a; color: #4a4; border: 1px solid #2a3a2a; }
    .badge-wip { background: #2a2a1a; color: #aa8; border: 1px solid #3a3a2a; }
    .badge-todo { background: #1a1a1a; color: #444; border: 1px solid #222; }
    select#creature-select { background: #1a1a1a; border: 1px solid #333; color: #888; font-size: 11px; font-family: inherit; padding: 3px 6px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .seed-btn { background: #222; border: 1px solid #333; color: #aaa; padding: 3px 10px; cursor: pointer; font-family: inherit; font-size: 11px; }
    .seed-btn:hover { background: #333; }
    .open-link { color: #555; text-decoration: none; font-size: 10px; }
    .open-link:hover { color: #888; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .panel { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid #1a1a1a; overflow: hidden; }
    .panel:last-of-type { border-right: none; }
    .panel-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; flex-shrink: 0; }
    canvas { background: #000; max-width: 100%; max-height: 100%; }
    .ref-strip { width: 180px; border-left: 1px solid #1a1a1a; padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex-shrink: 0; }
    .ref-strip img { width: 100%; border: 1px solid #222; }
    .ref-label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
    .no-art { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #333; font-size: 11px; width: 100%; height: 100%; }
    .controls { padding: 5px 16px; border-top: 1px solid #222; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
    .controls label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; cursor: pointer; }
    .controls select { background: #1a1a1a; border: 1px solid #333; color: #aaa; font-size: 11px; font-family: inherit; padding: 2px 4px; }
    .loading { color: #444; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="index.html">← Lab</a>
    <button class="nav-btn" id="prev" title="Previous (←)">‹</button>
    <button class="nav-btn" id="next" title="Next (→)">›</button>
    <span class="creature-name" id="creature-name">—</span>
    <span class="badge" id="status-badge"></span>
    <select id="creature-select"></select>
    <div class="header-right">
      <a class="open-link" id="open-link" href="#">↗ open solo</a>
      <button class="seed-btn" id="reseed">Reseed</button>
      <label style="color:#555; font-size:11px; display:flex; align-items:center; gap:4px;">
        <input type="checkbox" id="animate" style="accent-color:#555"> Animate
      </label>
    </div>
  </div>

  <div class="main" id="main-panels">
    <div class="panel">
      <div class="panel-label">Skeleton</div>
      <canvas id="skel-raw"></canvas>
    </div>
    <div class="panel">
      <div class="panel-label">ASCII</div>
      <canvas id="next-ascii"></canvas>
    </div>
    <div class="panel">
      <div class="panel-label">Painted</div>
      <canvas id="next-raw"></canvas>
    </div>
    <div class="ref-strip" id="ref-strip">
      <div class="ref-label">Reference</div>
      <img id="ref-img" src="" alt="" style="display:none">
      <div id="no-ref" style="font-size:9px;color:#333;line-height:1.6;">No reference yet</div>
      <div class="ref-label" id="goals-label" style="margin-top:8px;display:none">Goals</div>
      <div id="goals-text" style="font-size:9px;color:#444;line-height:1.6;"></div>
    </div>
  </div>

  <div class="controls">
    <label>Size:
      <select id="canvas-size">
        <option value="400">400px</option>
        <option value="512" selected>512px</option>
        <option value="640">640px</option>
      </select>
    </label>
    <label>Cell:
      <select id="cell-size">
        <option value="3">3px</option>
        <option value="4" selected>4px</option>
        <option value="5">5px</option>
        <option value="6">6px</option>
      </select>
    </label>
    <label><input type="checkbox" id="show-grid"> Grid</label>
    <label><input type="checkbox" id="show-debug" checked> Skeleton debug</label>
    <span class="loading" id="loading-msg"></span>
  </div>

  <script type="module">
    import { renderAscii } from './ascii-renderer.js';
    import { drawBodyOutline, drawLimbChain, drawDebugSkeleton } from './skeleton.js';

    const CREATURES = [
      { slug: 'dire-rat',          name: 'Dire Rat',        level: 'L1', zone: 'Z1', status: 'done', ref: 'refs/rat-ref.png',
        goals: 'Hunched charge pose\nFacing left\nFur texture on body\nGlowing red eyes\nBig incisor teeth' },
      { slug: 'kobold',            name: 'Kobold',          level: 'L2', zone: 'Z1', status: 'done', ref: 'refs/kobold-ref.webp',
        goals: 'Extreme crouch, spear lunge\nDigitigrade legs\nScaly green-brown skin\nLarge yellow eyes\nFacing left' },
      { slug: 'goblin',            name: 'Goblin',          level: 'L3', zone: 'Z1', status: 'done', ref: 'refs/goblin-ref.webp',
        goals: '3/4 facing player, mid-swing axe\nOlive-green skin, HUGE ears\nBig head, wide snarl\nYellow-red eyes\nCrude leather armor' },
      { slug: 'giant-spider',      name: 'Giant Spider',    level: 'L4', zone: 'Z1', status: 'done', ref: 'refs/giant-spider-ref.jpg',
        goals: 'Low hunting stance\n8 legs spread wide\nAbdomen raised\nFangs forward\nFacing left' },
      { slug: 'skeleton-creature', name: 'Skeleton',        level: 'L5', zone: 'Z1', status: 'done', ref: 'refs/skeleton-ref.webp',
        goals: 'Sword raised overhead\nGreen glowing eye sockets\nExposed ribcage\nBone white with shadow\nFacing left' },
      { slug: 'goblin-shaman',     name: 'Goblin Shaman',   level: 'L6', zone: 'Z1', status: 'done', ref: 'refs/goblin-shaman-ref.webp',
        goals: 'Staff raised, casting pose\nPurple-green magical glow\nRobes and bone fetishes\nOlder, more sinister goblin\nFacing left' },
      { slug: 'gelatinous-ooze',   name: 'Gelatinous Ooze', level: 'L7', zone: 'Z1', status: 'done', ref: 'refs/gelatinous-ooze-ref.webp',
        goals: 'Translucent cube form\nDripping edges\nObject trapped inside\nBlue-green tint\nFacing left' },
      { slug: 'bugbear',           name: 'Bugbear',         level: 'L8', zone: 'Z1', status: 'wip',  ref: 'refs/bugbear-ref.webp',
        goals: 'Massive hunched brawler\nClub or morningstar raised\nMatted grey-brown fur\nYellow fangs, red eyes\nFacing left' },
      { slug: 'carrion-crawler',   name: 'Carrion Crawler', level: 'L9', zone: 'Z1', status: 'done', ref: 'refs/carrion-crawler-ref.webp',
        goals: 'Long segmented body\nTentacles spread forward\nMandibles open\nInsectoid green-brown\nFacing left' },
      { slug: 'hook-horror',       name: 'Hook Horror',     level: 'L10', zone: 'Z1', status: 'wip', ref: 'refs/hook-horror-ref.png',
        goals: 'Hunched cave predator\nBeaked screaming face\nOne hook low, one overhead\nPurple-blue flesh\nBrown scythe forearms\nDigitigrade legs\nFacing left' },
    ];

    // Populate dropdown
    const sel = document.getElementById('creature-select');
    CREATURES.forEach((c, i) => {
      const opt = document.createElement('option');
      opt.value = c.slug;
      opt.textContent = `${c.level} ${c.name}`;
      sel.appendChild(opt);
    });

    let currentIndex = 0;
    let currentMod = null;
    let animating = false;
    let animStart = 0;
    let rafId = null;

    // Parse URL for initial creature
    const params = new URLSearchParams(location.search);
    const initialSlug = params.get('creature');
    if (initialSlug) {
      const idx = CREATURES.findIndex(c => c.slug === initialSlug);
      if (idx >= 0) currentIndex = idx;
    }

    async function loadCreature(index) {
      if (animating) {
        animating = false;
        document.getElementById('animate').checked = false;
        if (rafId) cancelAnimationFrame(rafId);
      }

      currentIndex = ((index % CREATURES.length) + CREATURES.length) % CREATURES.length;
      const c = CREATURES[currentIndex];

      document.title = `Creature Lab — ${c.name}`;
      document.getElementById('creature-name').textContent = `${c.name}`;
      document.getElementById('creature-select').value = c.slug;
      document.getElementById('open-link').href = `${c.slug}.html`;

      const badge = document.getElementById('status-badge');
      badge.textContent = c.status;
      badge.className = `badge badge-${c.status}`;

      const refImg = document.getElementById('ref-img');
      const noRef = document.getElementById('no-ref');
      if (c.ref) {
        refImg.src = c.ref;
        refImg.alt = c.name;
        refImg.style.display = 'block';
        noRef.style.display = 'none';
      } else {
        refImg.style.display = 'none';
        noRef.style.display = 'block';
      }

      const goalsLabel = document.getElementById('goals-label');
      const goalsText = document.getElementById('goals-text');
      if (c.goals) {
        goalsLabel.style.display = 'block';
        goalsText.innerHTML = c.goals.split('\n').join('<br>');
      } else {
        goalsLabel.style.display = 'none';
        goalsText.textContent = '';
      }

      history.replaceState(null, '', `?creature=${c.slug}`);

      const loadingMsg = document.getElementById('loading-msg');
      loadingMsg.textContent = 'loading…';
      currentMod = null;

      try {
        const mod = await import(`./${c.slug}.js?v=${Date.now()}`);
        currentMod = mod.default;
        loadingMsg.textContent = '';
        render();
      } catch (e) {
        console.error('Failed to load', c.slug, e);
        loadingMsg.textContent = `error: ${e.message}`;
      }
    }

    function render(elapsed = 0) {
      if (!currentMod) return;
      const { draw, skeleton, gridW, gridH } = currentMod;

      const size = parseInt(document.getElementById('canvas-size').value, 10);
      const cellSize = parseInt(document.getElementById('cell-size').value, 10);
      const showGrid = document.getElementById('show-grid').checked;
      const showDebug = document.getElementById('show-debug').checked;

      const canvasW = size;
      const canvasH = Math.round(size * gridH / gridW);
      const maxDisplay = 380;
      const displayW = `${Math.min(canvasW, maxDisplay)}px`;
      const displayH = `${Math.min(canvasH, Math.round(maxDisplay * gridH / gridW))}px`;

      const c = CREATURES[currentIndex];
      const level = parseInt(c.level.replace('L', '')) || 1;
      const asciiOpts = { elapsed, cellSize, level, gridWidth: gridW, gridHeight: gridH };

      // -- Skeleton panel --
      const c1 = document.getElementById('skel-raw');
      c1.width = canvasW; c1.height = canvasH;
      c1.style.width = displayW; c1.style.height = displayH;
      const ctx1 = c1.getContext('2d');
      ctx1.fillStyle = '#000'; ctx1.fillRect(0, 0, canvasW, canvasH);
      if (skeleton.limbs) {
        for (let i = 0; i < skeleton.limbs.length; i += 2) {
          const limb = skeleton.limbs[i];
          drawLimbChain(ctx1, limb.segments, canvasW, canvasH, 'rgb(42,28,52)');
        }
      }
      drawBodyOutline(ctx1, skeleton.spine, canvasW, canvasH, 'rgb(68,52,112)');
      if (skeleton.limbs) {
        for (let i = 1; i < skeleton.limbs.length; i += 2) {
          const limb = skeleton.limbs[i];
          drawLimbChain(ctx1, limb.segments, canvasW, canvasH, 'rgb(92,74,142)');
        }
      }
      if (showDebug) drawDebugSkeleton(ctx1, skeleton, canvasW, canvasH);

      // -- ASCII panel --
      const c2 = document.getElementById('next-ascii');
      c2.width = canvasW; c2.height = canvasH;
      c2.style.width = displayW; c2.style.height = displayH;
      const ctx2 = c2.getContext('2d');
      ctx2.fillStyle = '#000'; ctx2.fillRect(0, 0, canvasW, canvasH);
      renderAscii(ctx2, (tctx, tw, th) => {
        draw(tctx, skeleton, tw, th);
      }, 0, 0, canvasW, canvasH, asciiOpts);

      // -- Painted panel --
      const c3 = document.getElementById('next-raw');
      c3.width = canvasW; c3.height = canvasH;
      c3.style.width = displayW; c3.style.height = displayH;
      const ctx3 = c3.getContext('2d');
      ctx3.fillStyle = '#000'; ctx3.fillRect(0, 0, canvasW, canvasH);
      draw(ctx3, skeleton, canvasW, canvasH);

      if (showGrid) {
        for (const canvas of [c1, c2, c3]) {
          const gctx = canvas.getContext('2d');
          gctx.strokeStyle = 'rgba(255,255,255,0.08)'; gctx.lineWidth = 1;
          const step = canvasW / 10;
          for (let x = 0; x <= canvasW; x += step) {
            gctx.beginPath(); gctx.moveTo(x, 0); gctx.lineTo(x, canvasH); gctx.stroke();
          }
          for (let y = 0; y <= canvasH; y += step) {
            gctx.beginPath(); gctx.moveTo(0, y); gctx.lineTo(canvasW, y); gctx.stroke();
          }
        }
      }
    }

    function animationLoop(ts) {
      if (!animating) return;
      render(ts - animStart);
      rafId = requestAnimationFrame(animationLoop);
    }

    // Controls
    document.getElementById('reseed').addEventListener('click', () => render(animating ? performance.now() - animStart : 0));
    document.getElementById('animate').addEventListener('change', (e) => {
      animating = e.target.checked;
      if (animating) { animStart = performance.now(); rafId = requestAnimationFrame(animationLoop); }
      else { if (rafId) cancelAnimationFrame(rafId); render(0); }
    });
    for (const id of ['canvas-size', 'cell-size', 'show-grid', 'show-debug']) {
      document.getElementById(id).addEventListener('change', () => render(animating ? performance.now() - animStart : 0));
    }

    // Navigation
    document.getElementById('prev').addEventListener('click', () => loadCreature(currentIndex - 1));
    document.getElementById('next').addEventListener('click', () => loadCreature(currentIndex + 1));
    document.getElementById('creature-select').addEventListener('change', (e) => {
      const idx = CREATURES.findIndex(c => c.slug === e.target.value);
      if (idx >= 0) loadCreature(idx);
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowLeft') loadCreature(currentIndex - 1);
      if (e.key === 'ArrowRight') loadCreature(currentIndex + 1);
    });

    loadCreature(currentIndex);
  </script>
</body>
</html>
