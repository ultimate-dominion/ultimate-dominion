<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creature Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #ccc; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; min-height: 100vh; }
    .header { padding: 14px 24px; border-bottom: 1px solid #222; display: flex; align-items: baseline; gap: 16px; }
    .header h1 { font-size: 15px; color: #888; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
    .header p { font-size: 11px; color: #444; }
    .header a { margin-left: auto; font-size: 11px; color: #555; text-decoration: none; padding: 3px 10px; border: 1px solid #2a2a2a; }
    .header a:hover { color: #888; border-color: #444; }
    .zone-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 3px; padding: 20px 24px 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; padding: 8px 24px 20px; }
    .card {
      background: #111; border: 1px solid #1a1a1a; border-radius: 3px;
      overflow: hidden; transition: border-color 0.15s;
      text-decoration: none; color: inherit; display: block; cursor: pointer;
    }
    .card:hover { border-color: #333; }
    .card.done:hover { border-color: #3a5a3a; }
    .card.wip:hover  { border-color: #4a4a2a; }
    .card.todo { opacity: 0.35; pointer-events: none; }
    /* Canvas preview area */
    .card-preview { width: 100%; height: 140px; background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .card-preview canvas { position: absolute; }
    .card-preview .placeholder { font-size: 24px; color: #1e1e1e; }
    /* Metadata */
    .card-body { padding: 8px 10px; border-top: 1px solid #1a1a1a; }
    .card-name { font-size: 12px; color: #bbb; }
    .card-meta { font-size: 9px; color: #555; margin-top: 3px; display: flex; gap: 8px; align-items: center; }
    .badge { font-size: 8px; padding: 1px 4px; border-radius: 2px; text-transform: uppercase; letter-spacing: 1px; }
    .badge-done { background: #1a2a1a; color: #4a4; border: 1px solid #2a3a2a; }
    .badge-wip  { background: #2a2a1a; color: #aa8; border: 1px solid #3a3a2a; }
    .badge-todo { background: #1a1a1a; color: #444; border: 1px solid #222; }
    .summary { padding: 14px 24px; border-top: 1px solid #1a1a1a; margin-top: 8px; font-size: 10px; color: #444; display: flex; gap: 20px; }
    .summary span { color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Creature Lab</h1>
    <p>Ultimate Dominion ASCII creature art pipeline</p>
    <a href="gallery.html">Gallery ›</a>
    <a href="viewer.html">Viewer ›</a>
  </div>

  <div class="zone-label">Z1 — Dark Cave</div>
  <div class="grid" id="z1-grid"></div>

  <div class="zone-label">Z2 — Windy Peaks</div>
  <div class="grid" id="z2-grid"></div>

  <div class="zone-label">Player Characters</div>
  <div class="grid" id="pc-grid"></div>

  <div class="summary" id="summary"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import { renderAscii } from './ascii-renderer.js';
    import { createThreeRenderer } from './three-bridge.js';
    import { loadGLBCreature } from './glb-loader.js';

    // Canonical creature data — symlinked to packages/client/src/.../creatures.json
    const creaturesJson = await fetch('./creatures.json').then((r) => r.json());

    // Placeholder creatures not yet built (todos)
    const TODOS = [
      { slug: 'dire-wolf', name: 'Dire Wolf', zone: 1, level: 11 },
      { slug: 'worg',      name: 'Worg',      zone: 2, level: 14 },
      { slug: 'manticore', name: 'Manticore', zone: 2, level: 19 },
    ];

    const PREVIEW_W = 180;
    const PREVIEW_H = 140;
    const RENDER_SIZE = 420;
    const CELL = 3;

    let threeRenderer = null;

    function createCard(c) {
      const card = document.createElement('a');
      card.className = `card ${c.status || 'done'}`;
      card.href = `review.html?creature=${c.slug}`;
      card.dataset.slug = c.slug;

      const preview = document.createElement('div');
      preview.className = 'card-preview';
      const placeholder = document.createElement('span');
      placeholder.className = 'placeholder';
      placeholder.textContent = '?';
      preview.appendChild(placeholder);

      const body = document.createElement('div');
      body.className = 'card-body';
      const label = c.isBoss ? 'Boss' : c.category === 'pc' ? 'Base' : `L${c.level}`;
      const badgeClass = c.status === 'wip' ? 'badge-wip' : 'badge-done';
      const badgeLabel = c.status === 'wip' ? 'wip' : 'done';
      body.innerHTML = `
        <div class="card-name">${c.name}</div>
        <div class="card-meta"><span>${label}</span><span class="badge ${badgeClass}">${badgeLabel}</span></div>
      `;

      card.appendChild(preview);
      card.appendChild(body);
      return card;
    }

    function createTodoCard(t) {
      const card = document.createElement('div');
      card.className = 'card todo';
      card.innerHTML = `
        <div class="card-preview"><span class="placeholder">?</span></div>
        <div class="card-body">
          <div class="card-name">${t.name}</div>
          <div class="card-meta"><span>L${t.level}</span><span class="badge badge-todo">todo</span></div>
        </div>
      `;
      return card;
    }

    // Build cards, grouped by section, keeping level order interleaved with todos
    const z1Grid = document.getElementById('z1-grid');
    const z2Grid = document.getElementById('z2-grid');
    const pcGrid = document.getElementById('pc-grid');

    const z1 = creaturesJson.filter((c) => c.category === 'monster' && c.zone === 1);
    const z2 = creaturesJson.filter((c) => c.category === 'monster' && c.zone === 2);
    const pcs = creaturesJson.filter((c) => c.category === 'pc');
    const z1Todos = TODOS.filter((t) => t.zone === 1);
    const z2Todos = TODOS.filter((t) => t.zone === 2);

    // Merge dones+todos sorted by level
    const z1All = [...z1.map((c) => ({ ...c, _kind: 'done' })), ...z1Todos.map((t) => ({ ...t, _kind: 'todo' }))]
      .sort((a, b) => a.level - b.level);
    const z2All = [...z2.map((c) => ({ ...c, _kind: 'done' })), ...z2Todos.map((t) => ({ ...t, _kind: 'todo' }))]
      .sort((a, b) => a.level - b.level);

    for (const c of z1All) z1Grid.appendChild(c._kind === 'todo' ? createTodoCard(c) : createCard(c));
    for (const c of z2All) z2Grid.appendChild(c._kind === 'todo' ? createTodoCard(c) : createCard(c));
    for (const c of pcs)   pcGrid.appendChild(createCard(c));

    // Summary
    const total = creaturesJson.length + TODOS.length;
    const done = creaturesJson.length;
    document.getElementById('summary').innerHTML = `
      <span>${done} / ${total} complete</span>
      <span>Z1: ${z1.length} done</span>
      <span>Z2: ${z2.length} done, ${z2Todos.length} todo</span>
      <span>PCs: ${pcs.length} done</span>
    `;

    async function renderCardGLB(creature) {
      if (!threeRenderer) threeRenderer = createThreeRenderer(RENDER_SIZE, RENDER_SIZE);

      const glbPath = `glb/${creature.slug}-animated.glb`;
      const { drawFn } = await loadGLBCreature(glbPath, creature.gridWidth, creature.gridHeight, threeRenderer);

      const cW = RENDER_SIZE;
      const cH = Math.round(RENDER_SIZE * creature.gridHeight / creature.gridWidth);
      const scale = Math.min(PREVIEW_W / cW, PREVIEW_H / cH);

      const canvas = document.createElement('canvas');
      canvas.width = cW;
      canvas.height = cH;
      canvas.style.width = `${Math.round(cW * scale)}px`;
      canvas.style.height = `${Math.round(cH * scale)}px`;

      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, cW, cH);

      renderAscii(ctx, (tctx, tw, th) => drawFn(tctx, tw, th),
        0, 0, cW, cH, { cellSize: CELL, level: creature.level, gridWidth: creature.gridWidth, gridHeight: creature.gridHeight });

      return canvas;
    }

    async function renderCardCanvas(creature) {
      const mod = (await import(`./${creature.slug}.js`)).default;
      if (!mod || typeof mod.draw !== 'function') return null;

      const { draw, skeleton } = mod;
      const cW = RENDER_SIZE;
      const cH = Math.round(RENDER_SIZE * creature.gridHeight / creature.gridWidth);
      const scale = Math.min(PREVIEW_W / cW, PREVIEW_H / cH);

      const canvas = document.createElement('canvas');
      canvas.width = cW;
      canvas.height = cH;
      canvas.style.width = `${Math.round(cW * scale)}px`;
      canvas.style.height = `${Math.round(cH * scale)}px`;

      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, cW, cH);

      renderAscii(ctx, (tctx, tw, th) => draw(tctx, skeleton, tw, th),
        0, 0, cW, cH, { cellSize: CELL, level: creature.level, gridWidth: creature.gridWidth, gridHeight: creature.gridHeight });

      return canvas;
    }

    async function renderPreview(creature) {
      const card = document.querySelector(`[data-slug="${creature.slug}"]`);
      if (!card) return;
      const preview = card.querySelector('.card-preview');

      try {
        const canvas = creature.render === 'glb'
          ? await renderCardGLB(creature)
          : await renderCardCanvas(creature);

        if (canvas) {
          preview.querySelector('.placeholder')?.remove();
          preview.appendChild(canvas);
        }
      } catch (e) {
        console.error(`[index] failed to render ${creature.slug}:`, e);
      }
    }

    for (const creature of creaturesJson) {
      renderPreview(creature);
    }
  </script>
</body>
</html>
