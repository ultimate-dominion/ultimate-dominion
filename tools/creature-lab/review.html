<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creature Review</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #ccc; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    .header { padding: 5px 14px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header a { color: #555; text-decoration: none; font-size: 11px; padding: 2px 8px; border: 1px solid #2a2a2a; }
    .header a:hover { color: #888; border-color: #444; }
    .creature-name { color: #6a4; font-size: 13px; }
    .badge { font-size: 9px; padding: 1px 5px; text-transform: uppercase; letter-spacing: 1px; }
    .badge-done { color: #4a4; } .badge-wip { color: #aa8; }
    select { background: #1a1a1a; border: 1px solid #333; color: #888; font-size: 11px; font-family: inherit; padding: 2px 6px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .status { font-size: 10px; color: #555; }
    .nav-btn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #666; padding: 2px 8px; cursor: pointer; font-family: inherit; font-size: 14px; }
    .nav-btn:hover { color: #aaa; border-color: #444; }

    .main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    .ref-strip { width: 140px; flex-shrink: 0; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 6px; gap: 4px; overflow-y: auto; }
    .ref-label { font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
    .ref-img { width: 100%; border: 1px solid #222; display: block; }
    .ref-3d { width: 100%; border: 1px solid #222; display: block; background: #000; }

    .clips-area { flex: 1; display: flex; flex-direction: column; overflow-y: auto; min-height: 0; }

    /* Column headers */
    .col-headers { display: flex; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
    .col-headers .spacer { width: 52px; flex-shrink: 0; }
    .col-headers .col-label { flex: 1; text-align: center; font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 1px; padding: 3px 0; }
    .col-headers .col-label.game { color: #6a4; }

    .clip-row { flex: 0 0 auto; height: 120px; display: flex; align-items: stretch; border-bottom: 1px solid #0e0e0e; overflow: hidden; }
    .clip-label { width: 62px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 8px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; border-right: 1px solid #111; text-align: center; padding: 2px; line-height: 1.2; }
    .clip-label .clip-name { white-space: pre-line; }
    .clip-label.missing { color: #533; }

    .clip-panels { flex: 1; display: flex; min-height: 0; }
    .clip-canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .clip-canvas-wrap canvas { max-width: 100%; max-height: 100%; object-fit: contain; background: #000; }
    .clip-canvas-wrap.game { border-left: 1px solid #1a1a1a; }

    .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 13px; z-index: 10; gap: 8px; }
    .loading-overlay.hidden { display: none; }
    .progress-bar { width: 200px; height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #4a4; width: 0%; transition: width 0.2s; }

    .verdict-bar { flex-shrink: 0; padding: 5px 14px; border-top: 1px solid #1a1a1a; display: flex; align-items: center; gap: 12px; font-size: 11px; }
    .verdict-bar button { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 3px 14px; cursor: pointer; font-family: inherit; font-size: 11px; }
    .verdict-bar button:hover { border-color: #555; color: #ccc; }
    .verdict-bar button.approve { border-color: #3a5a3a; color: #6a6; }
    .verdict-bar button.approve:hover { background: #1a2a1a; color: #8c8; }
    .verdict-bar button.reject { border-color: #5a3a3a; color: #a66; }
    .verdict-bar button.reject:hover { background: #2a1a1a; color: #c88; }
    .verdict-note { flex: 1; background: #111; border: 1px solid #222; color: #aaa; padding: 3px 8px; font-family: inherit; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html">Lab</a>
    <a href="viewer.html">Viewer</a>
    <button class="nav-btn" id="prev">&#8249;</button>
    <button class="nav-btn" id="next">&#8250;</button>
    <span class="creature-name" id="creature-name">--</span>
    <span class="badge" id="badge"></span>
    <select id="creature-select"></select>
    <div class="header-right">
      <span class="status" id="status">loading...</span>
    </div>
  </div>

  <div class="main" style="position:relative">
    <div class="loading-overlay" id="loading">
      <span id="loading-text">Loading creature...</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="ref-strip">
      <div class="ref-label">Reference</div>
      <img id="ref-img" class="ref-img" src="" style="display:none">
      <div class="ref-label" style="margin-top:6px">3D Model</div>
      <canvas id="ref-3d" class="ref-3d" width="256" height="256"></canvas>
    </div>

    <div class="clips-area" id="clips-area">
      <div class="col-headers">
        <div class="spacer"></div>
        <div class="col-label">Lab (3px half-block)</div>
        <div class="col-label game">Game View (10px + atmosphere)</div>
      </div>
    </div>
  </div>

  <div class="verdict-bar">
    <input class="verdict-note" id="verdict-note" placeholder="Notes (what works, what doesn't)...">
    <button class="reject" id="btn-reject">Reject</button>
    <button class="approve" id="btn-approve">Approve</button>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { renderAscii } from './ascii-renderer.js';
    import { createThreeRenderer } from './three-bridge.js';
    import { loadGLBCreature } from './glb-loader.js';

    // Loaded from ./creatures.json (canonical source, symlinked to packages/client/src/.../creatures.json)
    const REF_IMAGES = {
      'dire-rat': 'refs/rat-ref.png',
      'kobold': 'refs/kobold-ref.webp',
      'goblin': 'refs/goblin-ref.webp',
      'giant-spider': 'refs/giant-spider-ref.jpg',
      'skeleton': 'refs/skeleton-ref.webp',
      'goblin-shaman': 'refs/goblin-shaman-ref.webp',
      'bugbear': 'refs/bugbear-ref.webp',
      'carrion-crawler': 'refs/carrion-crawler-ref.webp',
      'hook-horror': 'refs/hook-horror-ref.webp',
      'basilisk': 'refs/basilisk-ref.png',
    };
    const creaturesJson = await fetch('./creatures.json').then((r) => r.json());
    const CREATURES = creaturesJson.map((c) => ({
      slug: c.slug,
      name: c.name,
      level: c.level,
      status: c.status || 'done',
      ref: c.ref || REF_IMAGES[c.slug],
      type: c.render,
      glbFile: c.render === 'glb' ? `glb/${c.slug}-animated.glb` : null,
      canvasModule: c.render === 'canvas' ? `./${c.slug}.js` : null,
      atmosphere: [c.atmosphere.r, c.atmosphere.g, c.atmosphere.b, c.atmosphere.intensity],
      labGrid: { w: c.gridWidth, h: c.gridHeight },
      gameGrid: { w: c.gridWidth, h: c.gridHeight },
    }));

    // Base clips to always show first (in this order), then any extras from GLB
    const BASE_CLIPS = ['idle', 'attack', 'hit', 'death', 'walk'];
    // Readable names for attack variant action_ids
    const ATTACK_NAMES = {
      99: 'Reaping Swing', 105: 'Triple Combo', 91: 'Blade Spin', 92: 'Double Combo',
      90: 'Counterstrike', 102: 'Sword Judgment', 97: 'Left Slash', 19: 'Skill 03',
      96: 'Kung Fu Punch', 100: 'Right Spin',
    };
    let REVIEW_CLIPS = [...BASE_CLIPS]; // Will be rebuilt per creature from GLB data
    const LIVE_FPS = 16;

    // Game view matches viewer.html Game View panel
    const GAME_PANEL_W = 280;
    const GAME_PANEL_H = 400;
    const GAME_CELL = 8;

    // Lab view
    const LAB_SIZE = 320;
    const LAB_CELL = 3;

    let threeRenderer = null;
    let currentIndex = 0;
    let animRunning = false;

    let clipCanvases = {};  // { clipName: { lab: canvas, game: canvas } }

    function getThreeRenderer(w, h) {
      if (!threeRenderer) threeRenderer = createThreeRenderer(w, h);
      return threeRenderer;
    }

    // ---- Populate dropdown ----
    const sel = document.getElementById('creature-select');
    CREATURES.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.slug;
      opt.textContent = `L${c.level} ${c.name}`;
      sel.appendChild(opt);
    });

    // ---- Build clip rows (two canvases per row: lab + game) ----
    function buildClipRows() {
      const area = document.getElementById('clips-area');
      // Keep column headers, clear the rest
      const headers = area.querySelector('.col-headers');
      area.innerHTML = '';
      area.appendChild(headers);

      clipCanvases = {};
      for (const clip of REVIEW_CLIPS) {
        const row = document.createElement('div');
        row.className = 'clip-row';

        const label = document.createElement('div');
        label.className = 'clip-label';
        label.id = `label-${clip}`;
        // Show readable name for attack variants (attack_99 → "99 Reaping Swing")
        const match = clip.match(/^attack_(\d+)$/);
        const displayName = match
          ? `${match[1]}\n${ATTACK_NAMES[+match[1]] || ''}`
          : clip;
        label.innerHTML = `<span class="clip-name">${displayName}</span>`;
        row.appendChild(label);

        const panels = document.createElement('div');
        panels.className = 'clip-panels';

        // Lab canvas
        const labWrap = document.createElement('div');
        labWrap.className = 'clip-canvas-wrap';
        const labCanvas = document.createElement('canvas');
        labWrap.appendChild(labCanvas);
        panels.appendChild(labWrap);

        // Game canvas
        const gameWrap = document.createElement('div');
        gameWrap.className = 'clip-canvas-wrap game';
        const gameCanvas = document.createElement('canvas');
        gameWrap.appendChild(gameCanvas);
        panels.appendChild(gameWrap);

        row.appendChild(panels);
        area.appendChild(row);

        clipCanvases[clip] = { lab: labCanvas, game: gameCanvas };
      }
    }

    // ---- Draw atmosphere glow (matches viewer.html exactly) ----
    function drawAtmosphere(ctx, w, h, atm) {
      const [r, g, b, intensity = 0.10] = atm;
      const cx = w / 2;
      const cy = h * 0.42;
      const rad = Math.max(w, h) * 0.65;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
      grad.addColorStop(0,    `rgba(${r},${g},${b},${intensity})`);
      grad.addColorStop(0.35, `rgba(${r},${g},${b},${intensity * 0.5})`);
      grad.addColorStop(0.7,  `rgba(${r},${g},${b},${intensity * 0.15})`);
      grad.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    // ---- Live rendering state ----
    // Instead of pre-capturing frames, we render each clip live every tick.
    // Each clip gets its own time tracker. We cycle through clips in the
    // render loop, seeking the mixer to each clip's current time.
    let liveState = null; // { drawFn, bundle, creature, clipTimes, clipDurations, restPos }
    let intervalId = null;

    function stopPlayback() {
      animRunning = false;
      if (intervalId) clearInterval(intervalId);
      intervalId = null;
    }

    // ---- Load and start live rendering for a GLB creature ----
    async function loadLiveGLB(creature) {
      const loading = document.getElementById('loading');
      const loadingText = document.getElementById('loading-text');
      const progressFill = document.getElementById('progress-fill');
      loading.classList.remove('hidden');
      loadingText.textContent = 'Loading GLB...';
      progressFill.style.width = '50%';

      const { w: gridW, h: gridH } = creature.labGrid;
      const labH = Math.round(LAB_SIZE * gridH / gridW);

      let bundle3D;
      try {
        bundle3D = await loadGLBCreature(
          creature.glbFile, gridW, gridH,
          getThreeRenderer(LAB_SIZE, labH)
        );
      } catch (e) {
        document.getElementById('status').textContent = `GLB failed: ${e.message}`;
        loading.classList.add('hidden');
        return;
      }

      const { drawFn, bundle } = bundle3D;
      const { actions, model } = bundle;
      const restPos = model.position.clone();

      // Build clip list from GLB
      const allClipNames = Object.keys(actions);
      REVIEW_CLIPS = [];
      for (const base of BASE_CLIPS) {
        if (allClipNames.includes(base)) REVIEW_CLIPS.push(base);
      }
      for (const name of allClipNames) {
        if (!BASE_CLIPS.includes(name)) REVIEW_CLIPS.push(name);
      }
      buildClipRows();

      // Render 3D reference thumbnail
      const ref3d = document.getElementById('ref-3d');
      ref3d.width = 256; ref3d.height = Math.round(256 * gridH / gridW);
      const ref3dCtx = ref3d.getContext('2d');
      ref3dCtx.fillStyle = '#000'; ref3dCtx.fillRect(0, 0, ref3d.width, ref3d.height);
      drawFn(ref3dCtx, ref3d.width, ref3d.height);

      // Set canvas sizes and mark missing clips
      const clipTimes = {};
      const clipDurations = {};
      for (const clipName of REVIEW_CLIPS) {
        const label = document.getElementById(`label-${clipName}`);
        if (!actions[clipName]) {
          label.classList.add('missing');
          label.innerHTML = `<span class="clip-name">${clipName}</span><span style="font-size:7px;color:#533">missing</span>`;
          continue;
        }
        const { w: gW, h: gH } = creature.labGrid;
        const lc = clipCanvases[clipName].lab;
        lc.width = LAB_SIZE; lc.height = Math.round(LAB_SIZE * gH / gW);
        const gc = clipCanvases[clipName].game;
        gc.width = GAME_PANEL_W; gc.height = GAME_PANEL_H;

        const clip = actions[clipName].getClip();
        clipDurations[clipName] = clip ? clip.duration : 1.0;
        clipTimes[clipName] = 0;
      }

      liveState = { drawFn, bundle, creature, clipTimes, clipDurations, restPos };

      loading.classList.add('hidden');
      progressFill.style.width = '100%';
      document.getElementById('status').textContent = `${REVIEW_CLIPS.length} clips — live`;
      startLiveLoop();
    }

    // ---- Load canvas creature (procedural) ----
    async function loadLiveCanvas(creature) {
      const loading = document.getElementById('loading');
      const loadingText = document.getElementById('loading-text');
      loading.classList.remove('hidden');
      loadingText.textContent = 'Loading canvas creature...';

      const { w: gridW, h: gridH } = creature.labGrid;
      const { w: gameGridW, h: gameGridH } = creature.gameGrid;
      const labH = Math.round(LAB_SIZE * gridH / gridW);

      const mod = await import(creature.canvasModule);
      const drawCreature = mod.default?.draw;
      const skeleton = mod.default?.skeleton;
      const durations = mod.CLIP_DURATIONS || { idle: 2, attack: 1, hit: 0.7, death: 1.5, walk: 1.5 };

      const ref3d = document.getElementById('ref-3d');
      ref3d.width = 256; ref3d.height = Math.round(256 * gridH / gridW);
      const ref3dCtx = ref3d.getContext('2d');
      ref3dCtx.fillStyle = '#000'; ref3dCtx.fillRect(0, 0, ref3d.width, ref3d.height);
      drawCreature(ref3dCtx, skeleton, ref3d.width, ref3d.height, null);

      REVIEW_CLIPS = Object.keys(durations);
      buildClipRows();

      const clipTimes = {};
      const clipDurations2 = {};
      for (const clipName of REVIEW_CLIPS) {
        const lc = clipCanvases[clipName].lab;
        lc.width = LAB_SIZE; lc.height = labH;
        const gc = clipCanvases[clipName].game;
        gc.width = GAME_PANEL_W; gc.height = GAME_PANEL_H;
        clipDurations2[clipName] = durations[clipName] || 1.0;
        clipTimes[clipName] = 0;
      }

      liveState = {
        canvasMode: true, drawCreature, skeleton, creature,
        clipTimes, clipDurations: clipDurations2,
        gridW, gridH, gameGridW, gameGridH, labH,
      };

      loading.classList.add('hidden');
      document.getElementById('status').textContent = `${REVIEW_CLIPS.length} clips — live`;
      startLiveLoop();
    }

    // ---- Unified load ----
    async function captureAllClips(creature) {
      if (creature.type === 'canvas') return loadLiveCanvas(creature);
      return loadLiveGLB(creature);
    }

    // ---- Live render loop (setInterval — works in background tabs) ----
    function startLiveLoop() {
      animRunning = true;
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(liveTick, 1000 / LIVE_FPS);
    }

    function liveTick() {
      if (!liveState) return;
      const dt = 1 / LIVE_FPS;

      if (liveState.canvasMode) {
        liveCanvasTick(dt);
      } else {
        liveGLBTick(dt);
      }
    }

    function liveCanvasTick(dt) {
      const { drawCreature, skeleton, creature, clipTimes, clipDurations, gridW, gridH, gameGridW, gameGridH, labH } = liveState;

      for (const clipName of REVIEW_CLIPS) {
        if (!clipDurations[clipName]) continue;
        const duration = clipDurations[clipName];

        // Advance time, loop
        clipTimes[clipName] = (clipTimes[clipName] + dt) % duration;
        const t = clipTimes[clipName] / duration;
        const anim = { clip: clipName, t };

        // Lab render
        const lc = clipCanvases[clipName].lab;
        const labCtx = lc.getContext('2d');
        labCtx.fillStyle = '#000';
        labCtx.fillRect(0, 0, LAB_SIZE, labH);
        renderAscii(labCtx, (tctx, tw, th) => {
          tctx.fillStyle = '#000'; tctx.fillRect(0, 0, tw, th);
          drawCreature(tctx, skeleton, tw, th, anim);
        }, 0, 0, LAB_SIZE, labH, {
          cellSize: LAB_CELL, level: creature.level,
          gridWidth: gridW, gridHeight: gridH,
          enableHalfBlock: true, brightnessBoost: 2.5, gamma: 0.35, ambient: 0.85,
        });

        // Game render
        const gc = clipCanvases[clipName].game;
        const gameCtx = gc.getContext('2d');
        gameCtx.fillStyle = '#000';
        gameCtx.fillRect(0, 0, GAME_PANEL_W, GAME_PANEL_H);
        drawAtmosphere(gameCtx, GAME_PANEL_W, GAME_PANEL_H, creature.atmosphere);
        renderAscii(gameCtx, (tctx, tw, th) => {
          tctx.fillStyle = '#000'; tctx.fillRect(0, 0, tw, th);
          drawCreature(tctx, skeleton, tw, th, anim);
        }, 0, 0, GAME_PANEL_W, GAME_PANEL_H, {
          cellSize: GAME_CELL, level: creature.level,
          gridWidth: gameGridW, gridHeight: gameGridH,
          enableHalfBlock: false, brightnessBoost: 1.8,
        });
      }
    }

    function liveGLBTick(dt) {
      const { drawFn, bundle, creature, clipTimes, clipDurations, restPos } = liveState;
      const { mixer, actions, model } = bundle;
      const { w: gridW, h: gridH } = creature.labGrid;
      const { w: gameGridW, h: gameGridH } = creature.gameGrid;
      const labH = Math.round(LAB_SIZE * gridH / gridW);

      for (const clipName of REVIEW_CLIPS) {
        if (!actions[clipName] || !clipDurations[clipName]) continue;
        const duration = clipDurations[clipName];

        // Advance time, loop
        clipTimes[clipName] = (clipTimes[clipName] + dt) % duration;

        // Seek mixer to this clip's time — order matters:
        // 1. Stop all + reset mixer to t=0 FIRST
        // 2. THEN reset+play action (so _startTime = mixer.time = 0)
        // 3. THEN advance to seekTime
        const seekTime = clipTimes[clipName];
        Object.values(actions).forEach(a => a.stop());
        model.position.copy(restPos);
        mixer.setTime(0);
        const action = actions[clipName];
        action.reset();
        action.loop = THREE.LoopOnce;
        action.clampWhenFinished = true;
        mixer.update(seekTime);

        // Lab render
        const lc = clipCanvases[clipName].lab;
        const labCtx = lc.getContext('2d');
        labCtx.fillStyle = '#000';
        labCtx.fillRect(0, 0, LAB_SIZE, labH);
        renderAscii(labCtx, (tctx, tw, th) => drawFn(tctx, tw, th), 0, 0, LAB_SIZE, labH, {
          cellSize: LAB_CELL,
          level: creature.level,
          gridWidth: gridW,
          gridHeight: gridH,
          enableHalfBlock: true,
          brightnessBoost: 2.5,
          gamma: 0.35,
          ambient: 0.85,
        });

        // Game render
        const gc = clipCanvases[clipName].game;
        const gameCtx = gc.getContext('2d');
        gameCtx.fillStyle = '#000';
        gameCtx.fillRect(0, 0, GAME_PANEL_W, GAME_PANEL_H);
        drawAtmosphere(gameCtx, GAME_PANEL_W, GAME_PANEL_H, creature.atmosphere);
        renderAscii(gameCtx, (tctx, tw, th) => drawFn(tctx, tw, th), 0, 0, GAME_PANEL_W, GAME_PANEL_H, {
          cellSize: GAME_CELL,
          level: creature.level,
          gridWidth: gameGridW,
          gridHeight: gameGridH,
          enableHalfBlock: false,
          brightnessBoost: 1.8,
        });
      }
    }

    // ---- Load creature ----
    async function loadCreature(index) {
      stopPlayback();
      currentIndex = ((index % CREATURES.length) + CREATURES.length) % CREATURES.length;
      const c = CREATURES[currentIndex];

      document.getElementById('creature-name').textContent = c.name;
      document.getElementById('creature-select').value = c.slug;
      const badge = document.getElementById('badge');
      badge.textContent = c.status;
      badge.className = `badge badge-${c.status}`;

      const refImg = document.getElementById('ref-img');
      if (c.ref) { refImg.src = c.ref; refImg.style.display = 'block'; }
      else { refImg.style.display = 'none'; }

      history.replaceState(null, '', `?creature=${c.slug}`);
      buildClipRows();
      await captureAllClips(c);
    }

    // ---- Verdict ----
    function saveVerdict(approved) {
      const c = CREATURES[currentIndex];
      const note = document.getElementById('verdict-note').value.trim();
      const entry = { slug: c.slug, approved, note, timestamp: new Date().toISOString() };

      const key = `creature-review-${c.slug}`;
      const hist = JSON.parse(localStorage.getItem(key) || '[]');
      hist.push(entry);
      localStorage.setItem(key, JSON.stringify(hist));

      const log = JSON.parse(localStorage.getItem('creature-review-log') || '[]');
      log.push(entry);
      localStorage.setItem('creature-review-log', JSON.stringify(log));

      document.getElementById('verdict-note').value = '';
      document.getElementById('status').textContent = `${approved ? 'Approved' : 'Rejected'} — ${note || 'no note'}`;
    }

    document.getElementById('btn-approve').addEventListener('click', () => saveVerdict(true));
    document.getElementById('btn-reject').addEventListener('click', () => saveVerdict(false));

    // ---- Navigation ----
    document.getElementById('prev').addEventListener('click', () => loadCreature(currentIndex - 1));
    document.getElementById('next').addEventListener('click', () => loadCreature(currentIndex + 1));
    document.getElementById('creature-select').addEventListener('change', (e) => {
      const idx = CREATURES.findIndex(c => c.slug === e.target.value);
      if (idx >= 0) loadCreature(idx);
    });
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if (e.key === 'ArrowLeft') loadCreature(currentIndex - 1);
      if (e.key === 'ArrowRight') loadCreature(currentIndex + 1);
    });

    // ---- Init ----
    const params = new URLSearchParams(location.search);
    const initSlug = params.get('creature');
    if (initSlug) {
      const idx = CREATURES.findIndex(c => c.slug === initSlug);
      if (idx >= 0) currentIndex = idx;
    }
    loadCreature(currentIndex);
  </script>
</body>
</html>
