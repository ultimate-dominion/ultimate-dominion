name: Smoke Tests (Fork Mode)

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fork-tests:
    name: Fork-Mode Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v0.3.0
      - run: pnpm install --frozen-lockfile
      - name: Build contracts only (skip client env validation)
        run: pnpm --filter contracts run build
      - name: Stub missing AccessControlLib.sol (ERC1155-puppet expects newer MUD)
        run: |
          mkdir -p packages/contracts/node_modules/@latticexyz/world-modules/src/utils
          echo "// SPDX-License-Identifier: MIT
          pragma solidity >=0.8.24;
          library AccessControlLib {}" > packages/contracts/node_modules/@latticexyz/world-modules/src/utils/AccessControlLib.sol
      - name: Run fork-mode tests against beta world
        working-directory: packages/contracts
        env:
          WORLD_ADDRESS: ${{ secrets.BETA_WORLD_ADDRESS }}
        run: >
          forge test
          --fork-url ${{ secrets.BASE_RPC_URL }}
          --match-contract "PostDeploySmoke|ForkTest"
          --skip script
          -vv
