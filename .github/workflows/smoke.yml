name: Smoke Tests (Fork Mode)

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fork-tests:
    name: Fork-Mode Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v0.3.0
      - run: pnpm install --frozen-lockfile
      - name: Build contracts (mud build handles ERC1155-puppet via codegen)
        run: pnpm --filter contracts run build
      - name: Remove ERC1155-puppet submodule (incompatible with MUD v2.2.23)
        run: |
          rm -rf packages/contracts/lib/ERC1155-puppet
          rm -rf .git/modules/packages/contracts/lib/ERC1155-puppet
          git config --remove-section submodule.packages/contracts/lib/ERC1155-puppet 2>/dev/null || true
          rm -f .gitmodules
      - name: Run fork-mode tests against beta world
        working-directory: packages/contracts
        env:
          WORLD_ADDRESS: ${{ secrets.BETA_WORLD_ADDRESS }}
        run: >
          forge test
          --fork-url ${{ secrets.BASE_RPC_URL }}
          --match-contract "PostDeploySmoke|ForkTest"
          --skip script
          -vv
