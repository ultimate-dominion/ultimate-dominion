name: Smoke Tests (Fork Mode)

on:
  push:
    branches: [dev]

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fork-tests:
    name: Fork-Mode Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v0.3.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run fork-mode tests against beta world
        working-directory: packages/contracts
        env:
          WORLD_ADDRESS: ${{ secrets.BETA_WORLD_ADDRESS }}
        run: >
          forge test
          --fork-url ${{ secrets.BASE_RPC_URL }}
          --match-contract "PostDeploySmoke|ForkTest"
          --skip script
          -vv
