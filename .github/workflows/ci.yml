name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run client tests
        env:
          VITE_WALLET_CONNECT_PROJECT_ID: "test"
        run: pnpm --filter client run test

  indexer-tests:
    name: Indexer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ud/indexer run test

  relayer-tests:
    name: Relayer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ud/relayer run test

  solidity-unit:
    name: Solidity Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v0.3.0
      - run: pnpm install --frozen-lockfile
      - name: Build contracts (mud build handles ERC1155-puppet via codegen)
        run: pnpm --filter contracts run build
      - name: Remove ERC1155-puppet submodule (incompatible with MUD v2.2.23)
        working-directory: packages/contracts
        run: rm -rf lib/ERC1155-puppet && git config --remove-section submodule.packages/contracts/lib/ERC1155-puppet 2>/dev/null || true
      - name: Run pure Solidity unit tests (no RPC needed)
        working-directory: packages/contracts
        run: forge test --match-contract "CombatMathTest|StatCalculatorTest|EffectProcessorTest|Test_PveExpVariance" -vvv
      - name: Run balance validation tests (non-blocking)
        working-directory: packages/contracts
        continue-on-error: true
        run: forge test --match-contract "CombatBalanceTest" -vvv
