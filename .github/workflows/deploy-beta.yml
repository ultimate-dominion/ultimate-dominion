name: Deploy Beta

on:
  workflow_dispatch:
    inputs:
      run_zone_loader:
        description: "Run zone loader (fresh worlds only)"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-beta
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Contracts to Beta
    runs-on: ubuntu-latest
    environment: beta
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v0.3.0
      - run: pnpm install --frozen-lockfile
      - name: Build contracts
        run: pnpm --filter contracts build

      - name: Deploy contracts (mud deploy)
        working-directory: packages/contracts
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.BASE_RPC_URL }}
          WORLD_ADDRESS: ${{ secrets.BETA_WORLD_ADDRESS }}
        run: >
          pnpm exec mud deploy
          --forgeScriptOptions="--slow"
          --profile=base-mainnet
          --worldAddress $WORLD_ADDRESS
          --rpc $RPC_URL
          --privateKey $PRIVATE_KEY

      - name: Ensure cross-namespace access grants
        working-directory: packages/contracts
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.BASE_RPC_URL }}
          WORLD_ADDRESS: ${{ secrets.BETA_WORLD_ADDRESS }}
        run: >
          forge script script/EnsureAccess.s.sol
          --tc EnsureAccess
          --sig "run(address)" $WORLD_ADDRESS
          --rpc-url $RPC_URL
          --private-key $PRIVATE_KEY
          --broadcast

      - name: Run zone loader
        if: ${{ inputs.run_zone_loader }}
        working-directory: packages/contracts
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.BASE_RPC_URL }}
          WORLD_ADDRESS: ${{ secrets.BETA_WORLD_ADDRESS }}
        run: npx tsx scripts/zone-loader.ts dark_cave

      - name: Post-deploy smoke test
        working-directory: packages/contracts
        env:
          WORLD_ADDRESS: ${{ secrets.BETA_WORLD_ADDRESS }}
        run: >
          forge test
          --fork-url ${{ secrets.BASE_RPC_URL }}
          --match-contract PostDeploySmoke
          --skip script
          -vv
